<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSS-CE Codebase Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <style>
    :root {
      --bg-dark: #0b0f19;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --success: #34d399;
      --warning: #fbbf24;
      --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(11, 15, 25, 0.5);
      backdrop-filter: blur(10px);
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .path {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr 340px;
      height: calc(100vh - 60px);
    }
    .panel {
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: rgba(11, 15, 25, 0.2);
    }
    .panel-header {
      padding: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .scrollable {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .scrollable::-webkit-scrollbar { width: 6px; }
    .scrollable::-webkit-scrollbar-track { background: transparent; }
    .scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .scrollable::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .file-card {
      padding: 0.85rem;
      border-radius: 8px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-card:hover {
      border-color: rgba(56, 189, 248, 0.4);
      background: rgba(56, 189, 248, 0.02);
    }
    .file-card.active {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.15);
    }
    .file-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 0.5rem;
    }
    .rank-badge {
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .rank-badge.high { background: rgba(52, 211, 153, 0.1); color: var(--success); }
    .rank-badge.mid { background: rgba(251, 191, 36, 0.1); color: var(--warning); }
    .rank-badge.low { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

    .layer-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .layer-badge.entrypoint { background: rgba(244, 63, 94, 0.15); color: #fda4af; }
    .layer-badge.service { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; }
    .layer-badge.storage { background: rgba(52, 211, 153, 0.15); color: #a7f3d0; }

    .graph-panel {
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, #111827 0%, #030712 100%);
      position: relative;
    }
    .graph-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 1rem;
      position: relative;
    }
    #mermaid-target {
      width: 100%;
      height: 100%;
    }

    .details-panel {
      border-right: none;
      border-left: 1px solid var(--border-color);
    }
    .detail-section {
      margin-bottom: 1.5rem;
    }
    .detail-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.025em;
    }
    .symbol-item {
      padding: 0.5rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
    }
    .symbol-type {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      display: inline-block;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      margin-right: 0.4rem;
    }
    .type-class { background: rgba(129, 140, 248, 0.15); color: #a5b4fc; }
    .type-function { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; }
    .type-route { background: rgba(244, 63, 94, 0.15); color: #fda4af; }
    
    .symbol-sig {
      font-family: var(--font-mono);
      margin-top: 0.25rem;
      color: #cbd5e1;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <h1>HSS-CE Codebase Explorer</h1>
    <div class="path" id="root-path">.</div>
  </header>
  <div class="layout">
    <div class="panel">
      <div class="panel-header">
        <span>Files</span>
        <span style="font-size:0.75rem;color:var(--text-muted);" id="file-count">0</span>
      </div>
      <div style="padding: 0.75rem; border-bottom: 1px solid var(--border-color);">
        <input type="text" id="search-box" placeholder="Search files or symbols..." style="width: 100%; padding: 0.5rem 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-family: var(--font-sans); font-size: 0.85rem;" oninput="filterFiles()" />
      </div>
      <div class="scrollable" id="files-list"></div>
    </div>
    
    <div class="panel graph-panel">
      <div class="panel-header">
        <span>Architecture Diagram</span>
      </div>
      <div class="graph-container">
        <div id="mermaid-target"></div>
      </div>
    </div>

    <div class="panel details-panel">
      <div class="panel-header">
        <span>Details</span>
      </div>
      <div class="scrollable" id="details-content">
        <div style="color:var(--text-muted);text-align:center;margin-top:2rem;">Click a file to view details</div>
      </div>
    </div>
  </div>

  <script>
    const data = [{"path":"src/db.js","pagerank":1,"layer":"storage","summary":null,"symbols":[{"name":"CodeDatabase","type":"class","signature":"class CodeDatabase"}]},{"path":"src/indexer.js","pagerank":1,"layer":"service","summary":null,"symbols":[{"name":"CodeIndexer","type":"class","signature":"class CodeIndexer"}]},{"path":"src/pagerank.js","pagerank":0.971821599458561,"layer":"service","summary":null,"symbols":[{"name":"calculatePageRank","type":"function","signature":"function calculatePageRank(files, dependencies, iterations = 20, d = 0.85, personalization = null, gitWeights = null)"}]},{"path":"src/parser.js","pagerank":0.971821599458561,"layer":"service","summary":null,"symbols":[{"name":"getLineNumber","type":"function","signature":"function getLineNumber(content, index)"},{"name":"parseFile","type":"function","signature":"function parseFile(filePath)"},{"name":"parseJS","type":"function","signature":"function parseJS(content, symbols, imports)"},{"name":"parsePython","type":"function","signature":"function parsePython(content, symbols, imports)"},{"name":"determineLayer","type":"function","signature":"function determineLayer(filePath, symbols = [])"}]},{"path":"src/mcp-server.js","pagerank":0.7017543859681328,"layer":"service","summary":null,"symbols":[{"name":"runMcpServer","type":"function","signature":"function runMcpServer(dbPath, rootDir)"},{"name":"makeSafeId","type":"function","signature":"const makeSafeId = (p) => ..."},{"name":"estimateTokens","type":"function","signature":"const estimateTokens = (str) => ..."},{"name":"estimateTokens","type":"function","signature":"const estimateTokens = (str) => ..."},{"name":"redactSecrets","type":"function","signature":"const redactSecrets = (content) => ..."}]},{"path":"src/integrate.js","pagerank":0.6777712779533026,"layer":"service","summary":null,"symbols":[{"name":"askQuestion","type":"function","signature":"const askQuestion = (query) => ..."},{"name":"ensureDir","type":"function","signature":"function ensureDir(dir)"},{"name":"writeOrAppend","type":"function","signature":"function writeOrAppend(filePath, content)"},{"name":"generateAgentRules","type":"function","signature":"function generateAgentRules(targetProject, cliPath)"},{"name":"main","type":"function","signature":"function main()"}]},{"path":"src/cli.js","pagerank":0.5468215994577311,"layer":"entrypoint","summary":null,"symbols":[{"name":"makeSafeId","type":"function","signature":"const makeSafeId = (p) => ..."},{"name":"generateMermaidGraph","type":"function","signature":"function generateMermaidGraph(deps, isMarkdown = false)"},{"name":"generateLayeredMermaidGraph","type":"function","signature":"function generateLayeredMermaidGraph(deps, map, isMarkdown = false)"},{"name":"estimateTokens","type":"function","signature":"function estimateTokens(str)"},{"name":"redactSecrets","type":"function","signature":"function redactSecrets(content)"},{"name":"formatCompactMap","type":"function","signature":"function formatCompactMap(map, tokenBudget)"},{"name":"filterFiles","type":"function","signature":"function filterFiles()"},{"name":"highlightNodeInSvg","type":"function","signature":"function highlightNodeInSvg(filePath)"},{"name":"selectFile","type":"function","signature":"function selectFile(index)"},{"name":"printUsage","type":"function","signature":"function printUsage()"},{"name":"formatSkeletonMap","type":"function","signature":"function formatSkeletonMap(map)"}]},{"path":"src/enrich.js","pagerank":0.3229616454707087,"layer":"service","summary":null,"symbols":[{"name":"enrichCodebase","type":"function","signature":"function enrichCodebase(db, rootDir, apiKey, force = false)"}]}];
    const mermaidDef = `graph TD
  subgraph Entrypoints
    src_cli_js["src/cli.js"]
  end
  subgraph Services
    src_indexer_js["src/indexer.js"]
    src_pagerank_js["src/pagerank.js"]
    src_parser_js["src/parser.js"]
    src_mcp_server_js["src/mcp-server.js"]
    src_integrate_js["src/integrate.js"]
    src_enrich_js["src/enrich.js"]
  end
  subgraph Storage
    src_db_js["src/db.js"]
  end
  src_cli_js -->|"CodeDatabase"| src_db_js
  src_cli_js -->|"CodeIndexer"| src_indexer_js
  src_cli_js -->|"runMcpServer"| src_mcp_server_js
  src_indexer_js -->|"parseFile"| src_parser_js
  src_indexer_js -->|"determineLayer"| src_parser_js
  src_indexer_js -->|"calculatePageRank"| src_pagerank_js
  src_mcp_server_js -->|"CodeDatabase"| src_db_js
  src_mcp_server_js -->|"CodeIndexer"| src_indexer_js
`;
    const rootPath = "/Users/phuonglt/Projects/hss-ce";

    document.getElementById('root-path').textContent = rootPath;
    document.getElementById('file-count').textContent = data.length + ' files';

    mermaid.initialize({ maxTextSize: 1000000, startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
    const target = document.getElementById('mermaid-target');
    target.textContent = mermaidDef;
    target.className = 'mermaid';
    
    mermaid.run().then(() => {
      const svgElement = document.querySelector('#mermaid-target svg');
      if (svgElement) {
        svgElement.removeAttribute('style');
        svgElement.style.width = '100%';
        svgElement.style.height = '100%';
        svgPanZoom(svgElement, {
          zoomEnabled: true,
          controlIconsEnabled: true,
          fit: true,
          center: true,
          minZoom: 0.1,
          maxZoom: 10
        });

        // Add node click listeners
        svgElement.querySelectorAll('.node').forEach(nodeEl => {
          nodeEl.style.cursor = 'pointer';
          nodeEl.addEventListener('click', () => {
            const idAttr = nodeEl.id || '';
            const match = idAttr.match(/flowchart-([a-zA-Z0-9_]+)/) || idAttr.match(/([a-zA-Z0-9_]+)/);
            const nodeId = match ? match[1] : '';
            const foundIndex = data.findIndex(f => f.path.replace(/[^a-zA-Z0-9]/g, '_') === nodeId);
            if (foundIndex !== -1) {
              selectFile(foundIndex);
            }
          });
        });
      }
    }).catch(err => console.error(err));

    const listContainer = document.getElementById('files-list');
    data.forEach((file, index) => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.onclick = () => selectFile(index);
      
      const name = document.createElement('span');
      name.className = 'file-name';
      name.textContent = file.path;
      
      const badge = document.createElement('span');
      const pr = file.pagerank;
      badge.className = 'rank-badge ' + (pr > 0.8 ? 'high' : pr > 0.4 ? 'mid' : 'low');
      badge.textContent = pr.toFixed(3);
      
      card.appendChild(name);
      card.appendChild(badge);
      listContainer.appendChild(card);
    });

    function filterFiles() {
      const query = document.getElementById('search-box').value.toLowerCase();
      const cards = document.querySelectorAll('.file-card');
      cards.forEach((card, idx) => {
        const file = data[idx];
        const matchPath = file.path.toLowerCase().includes(query);
        const matchSym = file.symbols.some(s => s.name.toLowerCase().includes(query));
        if (matchPath || matchSym) {
          card.style.display = 'flex';
        } else {
          card.style.display = 'none';
        }
      });
    }

    function highlightNodeInSvg(filePath) {
      const safeId = filePath.replace(/[^a-zA-Z0-9]/g, '_');
      const svg = document.querySelector('#mermaid-target svg');
      if (!svg) return;

      // Reset all nodes and edges opacity
      svg.querySelectorAll('.node').forEach(el => el.style.opacity = '0.3');
      svg.querySelectorAll('.edgePath').forEach(el => el.style.opacity = '0.1');
      svg.querySelectorAll('.edgeLabel').forEach(el => el.style.opacity = '0.1');

      // Find clicked node
      const nodeEl = svg.querySelector(`.node[id*="${safeId}"]`) || svg.querySelector(`[id^="${safeId}"]`);
      if (nodeEl) {
        nodeEl.style.opacity = '1';
        
        svg.querySelectorAll('.edgePath').forEach(el => {
          const classList = el.className.baseVal || '';
          if (classList.includes(safeId)) {
            el.style.opacity = '1';
            const classes = classList.split(' ');
            classes.forEach(cls => {
              if (cls.startsWith('LS-') || cls.startsWith('LE-')) {
                const targetNodeId = cls.slice(3);
                const connectedNode = svg.querySelector(`.node[id*="${targetNodeId}"]`);
                if (connectedNode) {
                  connectedNode.style.opacity = '0.8';
                }
              }
            });
          }
        });
      } else {
        svg.querySelectorAll('.node').forEach(el => el.style.opacity = '1');
        svg.querySelectorAll('.edgePath').forEach(el => el.style.opacity = '1');
        svg.querySelectorAll('.edgeLabel').forEach(el => el.style.opacity = '1');
      }
    }

    function selectFile(index) {
      const cards = document.querySelectorAll('.file-card');
      cards.forEach((c, idx) => {
        if (idx === index) {
          c.classList.add('active');
          c.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
        else c.classList.remove('active');
      });

      const file = data[index];
      const detailsContainer = document.getElementById('details-content');
      detailsContainer.innerHTML = '';

      const titleSec = document.createElement('div');
      titleSec.className = 'detail-section';
      titleSec.innerHTML = `
        <h2 style="font-size:1.1rem;margin-bottom:0.25rem;word-break:break-all;">${file.path}</h2>
        <div style="display:flex;gap:0.5rem;align-items:center;margin:0.5rem 0;">
          <span class="layer-badge ${file.layer}">${file.layer.toUpperCase()}</span>
          <span style="font-size:0.75rem;color:var(--text-muted);">PageRank: ${file.pagerank.toFixed(4)}</span>
        </div>
        ${file.summary ? \`<p style="font-size:0.85rem;color:var(--text-main);line-height:1.4;background:rgba(255,255,255,0.02);padding:0.75rem;border-radius:6px;border:1px solid var(--border-color);margin-top:0.5rem;">${file.summary}</p>\` : ''}
      `;
      detailsContainer.appendChild(titleSec);

      const symSec = document.createElement('div');
      symSec.className = 'detail-section';
      symSec.innerHTML = '<div class="detail-section-title">Symbols</div>';
      
      if (file.symbols.length === 0) {
        symSec.innerHTML += '<div style="font-size:0.8rem;color:var(--text-muted);font-style:italic">No exported symbols</div>';
      } else {
        file.symbols.forEach(sym => {
          const item = document.createElement('div');
          item.className = 'symbol-item';
          
          const typeClass = 'type-' + sym.type.toLowerCase();
          item.innerHTML = `
            <div>
              <span class="symbol-type ${typeClass}">${sym.type}</span>
              <strong style="color:var(--text-main)">${sym.name}</strong>
            </div>
            ${sym.signature ? \`<div class="symbol-sig">${sym.signature}</div>\` : ''}
          `;
          symSec.appendChild(item);
        });
      }
      detailsContainer.appendChild(symSec);

      highlightNodeInSvg(file.path);
    }
  </script>
</body>
</html>
